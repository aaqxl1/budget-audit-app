<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Budget Audit — FY26</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<!-- SheetJS for Excel parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVQpTDqAwjo1LxqZjx43qKtn4YaCJ2DaY",
  authDomain: "budget-audit-app.firebaseapp.com",
  projectId: "budget-audit-app",
  storageBucket: "budget-audit-app.firebasestorage.app",
  messagingSenderId: "68647459712",
  appId: "1:68647459712:web:06c2506e6453c0d72dbf65"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
window._db = db;
window._firestoreOps = { doc, setDoc, getDoc, collection, getDocs };
window._firebaseReady = true;
window.dispatchEvent(new Event('firebaseReady'));
</script>

<style>
:root {
  --bg: #0f0f0f;
  --surface: #161616;
  --surface2: #1e1e1e;
  --surface3: #252525;
  --border: #2a2a2a;
  --border2: #333;
  --text: #e8e4dc;
  --text2: #9a9590;
  --text3: #5a5550;
  --accent: #c8a96e;
  --accent2: #e8c88e;
  --green: #4caf7d;
  --red: #e05c5c;
  --blue: #5c9ee0;
  --purple: #9b7fd4;
  --r: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ─── HEADER ─── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-logo {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.header-logo span { color: var(--text2); font-weight: 300; font-style: italic; }
.header-right { display: flex; align-items: center; gap: 16px; }

/* ─── VERSION SELECTOR ─── */
.version-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.version-bar label { color: var(--text2); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
select, .btn-sm {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 6px 12px;
  border-radius: var(--r);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}
select:hover, .btn-sm:hover { border-color: var(--accent); }
.badge {
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
}
.badge.live { border-color: var(--green); color: var(--green); }

/* ─── UPLOAD ZONE ─── */
#upload-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 120px);
  padding: 40px;
  text-align: center;
}
.upload-card {
  background: var(--surface);
  border: 2px dashed var(--border2);
  border-radius: 16px;
  padding: 60px 80px;
  max-width: 520px;
  width: 100%;
  transition: border-color 0.3s, background 0.3s;
  cursor: pointer;
}
.upload-card:hover, .upload-card.drag { border-color: var(--accent); background: #1a1810; }
.upload-icon { font-size: 48px; margin-bottom: 20px; }
.upload-card h2 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 26px; color: var(--accent); margin-bottom: 10px; }
.upload-card p { color: var(--text2); line-height: 1.6; margin-bottom: 24px; }
.btn-primary {
  background: var(--accent);
  color: #0f0f0f;
  border: none;
  padding: 12px 28px;
  border-radius: var(--r);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
#file-input { display: none; }

/* ─── TABS ─── */
.tabs-wrapper {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  overflow-x: auto;
}
.tabs {
  display: flex;
  gap: 0;
  white-space: nowrap;
}
.tab {
  padding: 14px 20px;
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  font-weight: 400;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

/* ─── MAIN CONTENT ─── */
.main { padding: 32px; max-width: 1600px; }

/* ─── SUMMARY CARDS ─── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
}
.kpi-card .kpi-label { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.kpi-card .kpi-value { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--text); }
.kpi-card .kpi-delta { font-family: 'DM Mono', monospace; font-size: 12px; margin-top: 4px; }
.kpi-card .kpi-delta.pos { color: var(--red); }
.kpi-card .kpi-delta.neg { color: var(--green); }
.kpi-card .kpi-delta.neu { color: var(--text2); }

/* ─── SECTION TITLE ─── */
.section-title {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 16px;
  margin-top: 32px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── TABLE ─── */
.table-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); margin-bottom: 24px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: var(--surface2); }
thead th {
  padding: 10px 14px;
  text-align: left;
  color: var(--text2);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
tbody td { padding: 10px 14px; color: var(--text); vertical-align: middle; }
td.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
td.pos { color: var(--red); font-family: 'DM Mono', monospace; font-size: 12px; }
td.neg { color: var(--green); font-family: 'DM Mono', monospace; font-size: 12px; }
td.neu { color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; }
.pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.pill-blue { background: #1a2d40; color: var(--blue); }
.pill-purple { background: #22183a; color: var(--purple); }
.pill-green { background: #0d2a1a; color: var(--green); }
.pill-red { background: #2a0f0f; color: var(--red); }
.pill-gold { background: #2a2010; color: var(--accent); }

/* ─── COMMENT FIELDS ─── */
.comment-cell { min-width: 180px; }
.comment-input {
  width: 100%;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  padding: 5px 8px;
  resize: none;
  min-height: 36px;
  transition: border-color 0.2s;
}
.comment-input:focus { outline: none; border-color: var(--accent); }
.comment-input.pp { border-color: #2a2040; }
.comment-input.pp:focus { border-color: var(--purple); }
.save-indicator {
  font-size: 10px;
  color: var(--green);
  opacity: 0;
  transition: opacity 0.3s;
  display: block;
}
.save-indicator.show { opacity: 1; }

/* ─── AI BADGE ─── */
.ai-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 4px;
  padding: 3px 7px;
  font-size: 10px;
  color: #7a7aff;
  margin-left: 6px;
  cursor: help;
}

/* ─── LOADING ─── */
#loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-screen p { color: var(--text2); font-size: 14px; }

/* ─── EMPTY STATE ─── */
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty p { margin-top: 8px; font-size: 13px; }

/* ─── FILTERS ─── */
.filters {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
}
.filters label { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

/* ─── MONTH FILTER ─── */
.month-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.month-chip {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}
.month-chip.active { background: #2a2010; border-color: var(--accent); color: var(--accent); }

/* ─── COLLAPSIBLE ─── */
.collapsible-header {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  transition: background 0.2s;
}
.collapsible-header:hover { background: var(--surface3); }
.collapsible-header h4 { font-size: 14px; color: var(--text); font-weight: 500; }
.collapsible-header .chevron { color: var(--text2); transition: transform 0.2s; }
.collapsible-header.open .chevron { transform: rotate(180deg); }
.collapsible-body { display: none; margin-bottom: 16px; }
.collapsible-body.open { display: block; }

/* ─── TOOLTIP ─── */
[title] { cursor: help; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .main { padding: 16px; }
  .header { padding: 0 16px; }
  .version-bar { padding: 10px 16px; }
  .tabs-wrapper { padding: 0 16px; }
  .upload-card { padding: 40px 24px; }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="loading-screen" class="hidden">
  <div class="spinner"></div>
  <p id="loading-msg">Processing your file…</p>
</div>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">Budget Audit <span>FY26</span></div>
  <div class="header-right">
    <span id="fb-status" class="badge">⬤ Firebase</span>
    <span id="file-badge" class="badge hidden">📄 <span id="file-name-badge"></span></span>
    <button class="btn-sm hidden" id="change-file-btn" onclick="resetApp()">↩ Change File</button>
  </div>
</header>

<!-- VERSION BAR (hidden until file loaded) -->
<div class="version-bar hidden" id="version-bar">
  <label>Budget Version</label>
  <select id="budget-version-sel"></select>
  <label>vs</label>
  <select id="actuals-version-sel"></select>
  <label>Month Filter</label>
  <div class="month-chips" id="month-chips"></div>
</div>

<!-- TABS (hidden until file loaded) -->
<div class="tabs-wrapper hidden" id="tabs-wrapper">
  <div class="tabs" id="tabs"></div>
</div>

<!-- UPLOAD ZONE -->
<div id="upload-zone">
  <div class="upload-card" id="drop-zone">
    <div class="upload-icon">📊</div>
    <h2>Budget Audit Tool</h2>
    <p>Upload your FY26 budget & actuals Excel file to begin.<br/>Your data stays in your browser — nothing is uploaded to any server.</p>
    <button class="btn-primary" onclick="document.getElementById('file-input').click()">Choose Excel File</button>
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFileSelect(event)"/>
    <p style="margin-top:16px; font-size:12px; color: var(--text3);">Drag & drop also supported</p>
  </div>
</div>

<!-- APP CONTENT -->
<div id="app-content" class="hidden">
  <div class="main" id="tab-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════════════
let RAW_DATA = [];
let COMMENTS = {}; // { key: { myComment, ppComment } }
let VERSIONS = [];
let MONTHS = [];
let HRBPS = [];
let BOATS = [];
let ACTIVE_TAB = 'summary';
let BUDGET_VERSION = '';
let ACTUALS_VERSION = '';
let ACTIVE_MONTHS = []; // empty = all

const BOAT_MAP = {
  'ASPIRATIONAL LUXURY': { short: 'ASP LUX', color: 'pill-purple' },
  'HIGH-END LUXURY': { short: 'HI-END', color: 'pill-blue' },
  'PREMIUM & DELEGATION': { short: 'PREM', color: 'pill-green' },
  'MGT': { short: 'MGT', color: 'pill-gold' },
};

// Column name mapping (flexible — handles slight naming differences)
const COL = {};

function mapColumns(headerRow) {
  const norm = s => String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  headerRow.forEach((h,i) => {
    const n = norm(h);
    if (n.includes('version')) COL.version = i;
    else if (n.includes('calendarmonth') || (n.includes('calendar') && n.includes('month'))) COL.month = i;
    else if (n === 'employee' || n === 'employeecode') COL.employee = i;
    else if (n === 'country') COL.country = i;
    else if (n === 'hrbp') COL.hrbp = i;
    else if (n === 'boat') COL.boat = i;
    else if (n === 'brand') COL.brand = i;
    else if (n.includes('employeecategory') || n === 'employeecategory') COL.empcat = i;
    else if (n === 'cc') COL.cc = i;
    else if (n === 'name' && !COL.ccname) COL.ccname = i;
    else if (n === 'empname' || n.includes('empname') || n === 'employeename') COL.empname = i;
    else if (n === 'jobtitle' && !COL.jobtitle) COL.jobtitle = i;
    else if (n === 'headcount') COL.headcount = i;
    else if (n.includes('deltaaction')) COL.deltaaction = i;
    else if (n.includes('totalmanpowercost') || n.includes('totalmanpower')) COL.tmc = i;
    else if (n.includes('totalnonpayroll') || n.includes('npe')) COL.npe = i;
    else if (n.includes('totalfix')) COL.totalfix = i;
    else if (n.includes('totalvariable')) COL.totalvar = i;
    else if (n.includes('grade')) COL.grade = i;
  });
}

// ═══════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════
let fbReady = false;
window.addEventListener('firebaseReady', () => {
  fbReady = true;
  document.getElementById('fb-status').textContent = '⬤ Firebase';
  document.getElementById('fb-status').classList.add('live');
  loadAllComments();
});

async function saveComment(key, field, value) {
  if (!fbReady) return;
  const { doc, setDoc } = window._firestoreOps;
  const db = window._db;
  if (!COMMENTS[key]) COMMENTS[key] = {};
  COMMENTS[key][field] = value;
  try {
    await setDoc(doc(db, 'comments', key), COMMENTS[key], { merge: true });
  } catch(e) { console.warn('Firebase save error:', e); }
}

async function loadAllComments() {
  if (!fbReady) return;
  const { collection, getDocs } = window._firestoreOps;
  const db = window._db;
  try {
    const snap = await getDocs(collection(db, 'comments'));
    snap.forEach(d => { COMMENTS[d.id] = d.data(); });
  } catch(e) { console.warn('Firebase load error:', e); }
}

// ═══════════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════════
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

function handleFileSelect(e) { if (e.target.files[0]) processFile(e.target.files[0]); }

function processFile(file) {
  showLoading('Reading Excel file…');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      updateLoading('Parsing data…');
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      parseData(rows);
      document.getElementById('file-name-badge').textContent = file.name;
      document.getElementById('file-badge').classList.remove('hidden');
      document.getElementById('change-file-btn').classList.remove('hidden');
      hideLoading();
      showApp();
    } catch(err) {
      hideLoading();
      alert('Error reading file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseData(rows) {
  if (rows.length < 2) return;
  const header = rows[0];
  mapColumns(header);

  RAW_DATA = rows.slice(1).filter(r => r.some(c => c !== ''));

  // Extract versions
  const vset = new Set();
  RAW_DATA.forEach(r => { if (r[COL.version]) vset.add(String(r[COL.version]).trim()); });
  VERSIONS = Array.from(vset).sort();

  // Extract months
  const mset = new Set();
  RAW_DATA.forEach(r => {
    const m = parseMonth(r[COL.month]);
    if (m) mset.add(m);
  });
  MONTHS = Array.from(mset).sort();
  ACTIVE_MONTHS = [];

  // Extract HRBPs, Boats
  const hset = new Set(), bset = new Set();
  RAW_DATA.forEach(r => {
    if (r[COL.hrbp]) hset.add(String(r[COL.hrbp]).trim());
    if (r[COL.boat]) bset.add(String(r[COL.boat]).trim().toUpperCase());
  });
  HRBPS = Array.from(hset).sort();
  BOATS = Array.from(bset).filter(b => b && b !== 'MGT').sort();

  // Set defaults
  const actuals = VERSIONS.find(v => v.toLowerCase().includes('actual')) || VERSIONS[VERSIONS.length - 1];
  const budgets = VERSIONS.filter(v => !v.toLowerCase().includes('actual')).sort();
  ACTUALS_VERSION = actuals;
  BUDGET_VERSION = budgets[budgets.length - 1] || VERSIONS[0];
}

function parseMonth(val) {
  if (!val) return null;
  if (val instanceof Date) return fmtMonth(val);
  const s = String(val);
  const d = new Date(s);
  if (!isNaN(d)) return fmtMonth(d);
  return s.trim();
}

function fmtMonth(d) {
  return d.toLocaleString('en-US', { month: 'short', year: '2-digit' });
}

// ═══════════════════════════════════════════════════
// APP INITIALIZATION
// ═══════════════════════════════════════════════════
function showApp() {
  document.getElementById('upload-zone').classList.add('hidden');
  document.getElementById('app-content').classList.remove('hidden');
  document.getElementById('version-bar').classList.remove('hidden');
  document.getElementById('tabs-wrapper').classList.remove('hidden');
  setupVersionBar();
  setupTabs();
  renderTab(ACTIVE_TAB);
}

function resetApp() {
  RAW_DATA = [];
  document.getElementById('upload-zone').classList.remove('hidden');
  document.getElementById('app-content').classList.add('hidden');
  document.getElementById('version-bar').classList.add('hidden');
  document.getElementById('tabs-wrapper').classList.add('hidden');
  document.getElementById('file-badge').classList.add('hidden');
  document.getElementById('change-file-btn').classList.add('hidden');
  document.getElementById('file-input').value = '';
}

function setupVersionBar() {
  const bsel = document.getElementById('budget-version-sel');
  const asel = document.getElementById('actuals-version-sel');
  bsel.innerHTML = VERSIONS.map(v => `<option ${v===BUDGET_VERSION?'selected':''} value="${v}">${v}</option>`).join('');
  asel.innerHTML = VERSIONS.map(v => `<option ${v===ACTUALS_VERSION?'selected':''} value="${v}">${v}</option>`).join('');
  bsel.onchange = () => { BUDGET_VERSION = bsel.value; renderTab(ACTIVE_TAB); };
  asel.onchange = () => { ACTUALS_VERSION = asel.value; renderTab(ACTIVE_TAB); };

  // Month chips
  const mc = document.getElementById('month-chips');
  mc.innerHTML = MONTHS.map(m =>
    `<div class="month-chip" data-m="${m}" onclick="toggleMonth('${m}')">${m}</div>`
  ).join('');
}

function toggleMonth(m) {
  const idx = ACTIVE_MONTHS.indexOf(m);
  if (idx > -1) ACTIVE_MONTHS.splice(idx, 1);
  else ACTIVE_MONTHS.push(m);
  document.querySelectorAll('.month-chip').forEach(c => {
    c.classList.toggle('active', ACTIVE_MONTHS.includes(c.dataset.m));
  });
  renderTab(ACTIVE_TAB);
}

function setupTabs() {
  const tabs = document.getElementById('tabs');
  const tabList = [
    { id: 'summary', label: '📊 Summary' },
    ...HRBPS.map(h => ({ id: 'hrbp_' + slug(h), label: '👤 ' + h })),
    ...BOATS.filter(b => b !== 'MGT').map(b => ({ id: 'boat_' + slug(b), label: '🚢 ' + shortBoat(b) })),
  ];
  tabs.innerHTML = tabList.map(t =>
    `<div class="tab ${t.id===ACTIVE_TAB?'active':''}" data-id="${t.id}" onclick="switchTab('${t.id}')">${t.label}</div>`
  ).join('');
}

function switchTab(id) {
  ACTIVE_TAB = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  renderTab(id);
}

// ═══════════════════════════════════════════════════
// DATA FILTERING
// ═══════════════════════════════════════════════════
function filterByVersion(version) {
  return RAW_DATA.filter(r => {
    const v = String(r[COL.version]||'').trim();
    if (v !== version) return false;
    if (ACTIVE_MONTHS.length === 0) return true;
    const m = parseMonth(r[COL.month]);
    return ACTIVE_MONTHS.includes(m);
  });
}

function groupBy(rows, keyFn) {
  const map = {};
  rows.forEach(r => {
    const k = keyFn(r);
    if (!map[k]) map[k] = [];
    map[k].push(r);
  });
  return map;
}

function sumField(rows, colIdx) {
  return rows.reduce((s, r) => s + (parseFloat(r[colIdx]) || 0), 0);
}

function variance(act, bud) { return act - bud; }
function varPct(act, bud) { return bud !== 0 ? ((act - bud) / Math.abs(bud)) * 100 : 0; }

// ═══════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════
function renderTab(id) {
  const content = document.getElementById('tab-content');
  if (id === 'summary') { content.innerHTML = renderSummary(); attachCommentHandlers(); return; }
  if (id.startsWith('hrbp_')) {
    const hrbp = HRBPS.find(h => slug(h) === id.replace('hrbp_',''));
    content.innerHTML = renderHRBP(hrbp);
    attachCommentHandlers();
    return;
  }
  if (id.startsWith('boat_')) {
    const boat = BOATS.find(b => slug(b) === id.replace('boat_',''));
    content.innerHTML = renderBoat(boat);
    attachCommentHandlers();
    return;
  }
}

// ─── SUMMARY TAB ───
function renderSummary() {
  const budRows = filterByVersion(BUDGET_VERSION);
  const actRows = filterByVersion(ACTUALS_VERSION);

  const bHC = sumField(budRows, COL.headcount);
  const aHC = sumField(actRows, COL.headcount);
  const bTMC = sumField(budRows, COL.tmc);
  const aTMC = sumField(actRows, COL.tmc);
  const bNPE = sumField(budRows, COL.npe);
  const aNPE = sumField(actRows, COL.npe);

  let html = `<h2 class="section-title">Overall Summary — ${BUDGET_VERSION} vs ${ACTUALS_VERSION}</h2>`;

  // KPI cards
  html += `<div class="kpi-grid">
    ${kpiCard('Total Headcount', aHC, variance(aHC,bHC), '', true)}
    ${kpiCard('Manpower Cost', aTMC, variance(aTMC,bTMC), '$')}
    ${kpiCard('Non-Payroll Elements', aNPE, variance(aNPE,bNPE), '$')}
    ${kpiCard('Budget HC', bHC, null, '', true)}
  </div>`;

  // By Boat
  html += `<h2 class="section-title">By Boat</h2>`;
  html += pivotTable(budRows, actRows, r => String(r[COL.boat]||'').trim().toUpperCase(), 'Boat', true);

  html += `<h2 class="section-title">By Country</h2>`;

  html += `<h2 class="section-title">By Boat — Front Liners</h2>`;
  const bFL = budRows.filter(r => isFrontLiner(r));
  const aFL = actRows.filter(r => isFrontLiner(r));
  html += pivotTable(bFL, aFL, r => String(r[COL.boat]||'').trim().toUpperCase(), 'Boat (Front Liners)', true);

  // By Boat — Back Office
  html += `<h2 class="section-title">By Boat — Back Office</h2>`;

  html += pivotTable(bBO, aBO, r => String(r[COL.boat]||'').trim().toUpperCase(), 'Boat (Back Office)', true);

// ─── PIVOT TABLE ───
function pivotTable(budRows, actRows, keyFn, label, isBoat) {
  const bMap = groupBy(budRows, keyFn);
  const aMap = groupBy(actRows, keyFn);
  const keys = Array.from(new Set([...Object.keys(bMap), ...Object.keys(aMap)])).filter(k => k).sort();

  if (!keys.length) return '<div class="empty">No data for selected filters.</div>';

  let html = `<div class="table-wrap"><table>
    <thead><tr>
      <th>${label}</th>
      <th>Bud HC</th><th>Act HC</th><th>Var HC</th>
      <th>Bud TMC</th><th>Act TMC</th><th>Var TMC</th>
      <th>Bud NPE</th><th>Act NPE</th><th>Var NPE</th>
    </tr></thead><tbody>`;

  keys.forEach(k => {
    const br = bMap[k] || [];
    const ar = aMap[k] || [];
    const bHC = sumField(br, COL.headcount), aHC = sumField(ar, COL.headcount);
    const bTMC = sumField(br, COL.tmc), aTMC = sumField(ar, COL.tmc);
    const bNPE = sumField(br, COL.npe), aNPE = sumField(ar, COL.npe);

    const vHC = variance(aHC, bHC);
    const vTMC = variance(aTMC, bTMC);
    const vNPE = variance(aNPE, bNPE);

    const boatMeta = isBoat && BOAT_MAP[k];
    const labelCell = boatMeta
      ? `<span class="pill ${boatMeta.color}">${boatMeta.short}</span>`
      : k || '—';

    html += `<tr>
      <td>${labelCell}</td>
      <td class="mono">${fmt0(bHC)}</td>
      <td class="mono">${fmt0(aHC)}</td>
      <td class="${varClass(vHC)}">${vHC > 0 ? '+' : ''}${fmt0(vHC)}</td>
      <td class="mono">${fmtM(bTMC)}</td>
      <td class="mono">${fmtM(aTMC)}</td>
      <td class="${varClass(vTMC)}">${vTMC > 0 ? '+' : ''}${fmtM(vTMC)}</td>
      <td class="mono">${fmtM(bNPE)}</td>
      <td class="mono">${fmtM(aNPE)}</td>
      <td class="${varClass(vNPE)}">${vNPE > 0 ? '+' : ''}${fmtM(vNPE)}</td>
    </tr>`;
  });

  // Totals row
  const bHCt = sumField(budRows, COL.headcount), aHCt = sumField(actRows, COL.headcount);
  const bTMCt = sumField(budRows, COL.tmc), aTMCt = sumField(actRows, COL.tmc);
  const bNPEt = sumField(budRows, COL.npe), aNPEt = sumField(actRows, COL.npe);
  const vHCt = variance(aHCt,bHCt), vTMCt = variance(aTMCt,bTMCt), vNPEt = variance(aNPEt,bNPEt);
  html += `<tr style="border-top: 2px solid var(--border2); font-weight:600">
    <td style="color:var(--accent)">TOTAL</td>
    <td class="mono">${fmt0(bHCt)}</td><td class="mono">${fmt0(aHCt)}</td>
    <td class="${varClass(vHCt)}">${vHCt>0?'+':''}${fmt0(vHCt)}</td>
    <td class="mono">${fmtM(bTMCt)}</td><td class="mono">${fmtM(aTMCt)}</td>
    <td class="${varClass(vTMCt)}">${vTMCt>0?'+':''}${fmtM(vTMCt)}</td>
    <td class="mono">${fmtM(bNPEt)}</td><td class="mono">${fmtM(aNPEt)}</td>
    <td class="${varClass(vNPEt)}">${vNPEt>0?'+':''}${fmtM(vNPEt)}</td>
  </tr>`;

  html += `</tbody></table></div>`;
  return html;
}

// ═══════════════════════════════════════════════════
// AI COMMENTS
// ═══════════════════════════════════════════════════
function aiComment(type, empName, jobTitle, vHC, vTMC, deltaAction, budHC) {
  const parts = [];

  if (vHC !== 0) {
    const sign = vHC > 0 ? '+' : '';
    if (type === 'BO') {
      if (deltaAction && deltaAction.toLowerCase().includes('new hire')) parts.push(`${sign}${fmt0(vHC)} HC — New Hire`);
      else if (deltaAction && deltaAction.toLowerCase().includes('terminat')) parts.push(`${sign}${fmt0(vHC)} HC — Termination`);
      else parts.push(`${sign}${fmt0(vHC)} HC${jobTitle ? ' — ' + jobTitle : ''}`);
    } else {
      // Front liner
      parts.push(`${sign}${fmt0(vHC)} HC${jobTitle ? ' — ' + jobTitle : ''}`);
    }
  }

  if (vTMC !== 0 && vHC === 0) {
    // Cost variance with no HC change
    const sign = vTMC > 0 ? '+' : '';
    parts.push(`Cost var ${sign}${fmtM(vTMC)} (HC unchanged)`);
  }

  if (parts.length === 0) return 'No variance';
  return parts.join(' | ');
}

// ═══════════════════════════════════════════════════
// COMMENT HANDLERS
// ═══════════════════════════════════════════════════
let saveTimers = {};
function attachCommentHandlers() {
  document.querySelectorAll('.my-comment').forEach(el => {
    el.addEventListener('input', () => debounceSave(el, 'myComment', 'my'));
  });
  document.querySelectorAll('.comment-input.pp').forEach(el => {
    el.addEventListener('input', () => debounceSave(el, 'ppComment', 'pp'));
  });
}

function debounceSave(el, field, pfx) {
  const ck = el.dataset.ck;
  clearTimeout(saveTimers[ck + field]);
  saveTimers[ck + field] = setTimeout(async () => {
    await saveComment(ck, field, el.value);
    const si = document.getElementById(`si_${pfx}_${ck}`);
    if (si) { si.classList.add('show'); setTimeout(() => si.classList.remove('show'), 2000); }
  }, 800);
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function isFrontLiner(r) {
  const cat = String(r[COL.empcat]||'').toLowerCase();
  return cat.includes('front') || cat.includes('liner') || cat.includes('frontliner');
}

function getEmpName(r) {
  const n = String(r[COL.empname]||'').trim();
  return n || String(r[COL.employee]||'').trim() || '—';
}

function slug(s) { return String(s).toLowerCase().replace(/[^a-z0-9]/g,'_'); }
function shortBoat(b) { return BOAT_MAP[b]?.short || b; }
function commentKey(...parts) { return parts.map(slug).join('__').substring(0, 180); }

function fmt0(n) { return Number(n).toLocaleString('en-US', {maximumFractionDigits:0}); }
function fmtM(n) {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1000000) return sign + '$' + (abs/1000000).toFixed(1) + 'M';
  if (abs >= 1000) return sign + '$' + (abs/1000).toFixed(0) + 'K';
  return sign + '$' + fmt0(abs);
}

function varClass(v) {
  if (v === 0) return 'neu';
  return v > 0 ? 'pos' : 'neg'; // positive variance = over budget = red
}

function kpiCard(label, val, delta, prefix, isCount) {
  const fmt = isCount ? fmt0 : fmtM;
  const dClass = delta === null ? '' : (delta > 0 ? 'pos' : delta < 0 ? 'neg' : 'neu');
  const dText = delta === null ? '' : `${delta > 0 ? '▲ +' : delta < 0 ? '▼ ' : ''}${fmt(delta)} vs budget`;
  return `<div class="kpi-card">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${prefix}${fmt(val)}</div>
    ${delta !== null ? `<div class="kpi-delta ${dClass}">${dText}</div>` : ''}
  </div>`;
}

function toggleCollapsible(id) {
  const body = document.getElementById(id);
  const header = body?.previousElementSibling;
  if (!body) return;
  const open = body.classList.toggle('open');
  header?.classList.toggle('open', open);
}

function showLoading(msg) {
  document.getElementById('loading-screen').classList.remove('hidden');
  document.getElementById('loading-msg').textContent = msg;
}
function updateLoading(msg) { document.getElementById('loading-msg').textContent = msg; }
function hideLoading() { document.getElementById('loading-screen').classList.add('hidden'); }
</script>
